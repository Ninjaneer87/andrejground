name: Deploy to GitHub Pages

on:
  push:
    branches: ["master"] # Matches your repo's main branch name

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build # This runs your webpack build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # Webpack puts the finished site here

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
